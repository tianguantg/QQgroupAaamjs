<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP三源查询</title>
    <style>
        body{font-family:system-ui;margin:20px auto;max-width:800px;background:#f5f5f5;padding:0 10px}
        h1{margin:0 0 15px;font-size:20px}
        .box{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
        .card{background:white;padding:15px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .title{font-weight:bold;color:#333;margin-bottom:8px;display:flex;justify-content:space-between}
        .status{font-size:12px;color:#999}
        .status.ok{color:green}.status.err{color:red}
        .row{display:flex;justify-content:space-between;margin:6px 0;font-size:14px;border-bottom:1px solid #eee;padding-bottom:4px}
        .row:last-child{border:none}
        .k{color:#666}.v{font-family:monospace;max-width:60%;text-align:right}
        pre{background:#f5f5f5;padding:8px;border-radius:4px;font-size:12px;overflow-x:auto;margin-top:8px}
        .err{color:red;font-size:12px;margin-top:5px}
        button{background:#333;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-bottom:15px}
    </style>
</head>
<body>
    <h1>IP 三源查询</h1>
    <button onclick="query()">刷新</button>
    <div class="box" id="box"></div>

<script>
const APIs=[
    {name:'IPIP.NET',url:'https://myip.ipip.net',t:'text',f:d=>{
        const m=d.match(/IP[：:]\s*(\S+).*?来自于[：:]\s*(.+)/);
        const p=m[2].split(/\s+/);
        return{ip:m[1],loc:p.slice(0,3).join(' '),isp:p[3]}
    }},
    {name:'IP.sb',url:'https://api.ip.sb/geoip',t:'json',f:d=>({
        ip:d.ip,loc:[d.country,d.region,d.city].filter(Boolean).join(' '),isp:d.isp||d.organization
    })},
    {name:'myip.la',url:'https://api.myip.la/cn?json',t:'json',f:d=>({
        ip:d.ip,loc:[d.location?.country,d.location?.province,d.location?.city].filter(Boolean).join(' '),
        isp:d.asn?.operator
    })}
];

function query(){
    box.innerHTML='';
    APIs.forEach(api=>{
        const div=document.createElement('div');
        div.className='card';
        div.innerHTML=`<div class="title">${api.name}<span class="status">查询...</span></div><div class="body">-</div>`;
        box.appendChild(div);
        
        fetch(api.url,{mode:'cors'}).then(r=>api.t=='text'?r.text():r.json())
        .then(d=>{
            const x=api.f(d);
            div.querySelector('.status').className='status ok';
            div.querySelector('.status').textContent='成功';
            div.querySelector('.body').innerHTML=`
                <div class="row"><span class="k">IP</span><span class="v">${x.ip||'-'}</span></div>
                <div class="row"><span class="k">位置</span><span class="v">${x.loc||'-'}</span></div>
                <div class="row"><span class="k">运营商</span><span class="v">${x.isp||'-'}</span></div>
                <pre>${typeof d=='string'?d:JSON.stringify(d,null,2)}</pre>
            `;
        }).catch(e=>{
            div.querySelector('.status').className='status err';
            div.querySelector('.status').textContent='失败';
            div.querySelector('.body').innerHTML=`<div class="err">${e=='Failed to fetch'?'网络/CORS错误':e}</div>`;
        });
    });
}

query();
</script>
</body>
</html>
